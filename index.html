<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
<div class="main-container">
    <div class="header">
        <h1>Library</h1>
    </div>
    <div class="add-new-area">
    <button id="add-new" command="show-modal" commandfor="input-modal">+ Add new book</button>
    </div>
    <div id="container">
    </div>

    <dialog id="input-modal">
        <button class="btn" commandfor="input-modal" command="close">Close</button>
        <form id="input-form">

            <div>
                <input type="text" id="booktitle" placeholder="Title" required />
            </div>

            <div>
                <input type="text" id="bookauthor" placeholder="Author" required/>
            </div>

            <div>

                <input type="number" id="pagecount" placeholder="Pages" required/>
            </div>

            <div>
                <label for="read">Have you read it?</label>
                <input type="checkbox" id="read" class="readcheck"/>
            </div>

            <button class="btn" type="submit" id="submit-btn">Add book</button>
        </form>
    </dialog>
</div>  
    
</body>
</html>
