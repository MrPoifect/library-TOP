<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <div id="container">
    </div>
    <button id="add-new" command="show-modal" commandfor="input-modal">Add new book</button>

    <dialog id="input-modal">
        <button commandfor="input-modal" command="close">Close</button>
        <form id="input-form" method="POST">

            <label for="booktitle">Book title:</label>
            <input type="text" id="booktitle" />

            <label for="bookauthor">Author:</label>
            <input type="text" id="bookauthor"/>

            <label for="pagecount">Page count:</label>
            <input type="number" id="pagecount"/>

            <label for="read">Read:</label>
            <input type="checkbox" id="read">

            <button id="submit">Add Book</button>
        </form>
    </dialog>

    
</body>
</html>
